# fly.toml app configuration file for webstie
# Updated to the current Fly Launch schema (the previous 2022 format used a
# deprecated [[services.ports]] structure the launch manifest parser rejects).
# See https://fly.io/docs/reference/configuration/

app = "webstie"
primary_region = "iad"

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
