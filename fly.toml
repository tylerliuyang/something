# fly.toml app configuration file generated for something-4kwvca on 2026-05-31T06:00:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'something-4kwvca'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
